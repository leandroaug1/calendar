<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Leandro - Clima Sumaré</title>
    <style>
        /* Reseta margens e garante preenchimento total */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden; /* Evita barra de rolagem dupla */
            background-color: #f4f4f4;
        }

        .wrapper {
            width: 100%;
            height: 100vh;
            display: flex;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbzVQLln0rxMNRlma7EBxcisE9aO8G-pg6Yv0P9ioYSKpgx4WIz2he0DJFOfDNAiTT9O/exec"
            allow="geolocation"
            title="Dashboard de Clima">
        </iframe>
    </div>

</body>
</html>
